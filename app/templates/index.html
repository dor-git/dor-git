<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinematic Resonance Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .ball {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            transform: scale(0.5);
        }
        .ball.show {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
        <h1 class="text-3xl font-bold text-center text-yellow-500 mb-2">Kinematic Resonance Engine ⚙️</h1>
        <p class="text-gray-400 text-center mb-6 text-sm">Simulating physical beat frequencies and trapdoor ejection.</p>

        <form id="drawForm" class="space-y-6 mb-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Draw Sequence</label>
                    <input type="number" id="seqInput" required min="1" 
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Motor Base (Hz)</label>
                    <input type="number" id="motorInput" required step="0.01" min="0.1" max="5.0" value="0.75"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Kinetic Mass (Hz)</label>
                    <input type="number" id="kineticInput" required step="0.01" min="0.1" max="10.0" value="3.14"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500">
                </div>
            </div>
            
            <button type="submit" 
                class="w-full bg-yellow-600 hover:bg-yellow-500 text-gray-900 font-bold py-3 px-4 rounded-lg transition-all duration-200 shadow-[0_0_15px_rgba(202,138,4,0.5)]">
                Spin Virtual Drum
            </button>
        </form>

        <div id="lirazNote" class="text-center mb-6 text-pink-400 font-medium italic min-h-[24px] transition-opacity duration-300 opacity-0"></div>

        <div id="resultsContainer" class="hidden">
            <h2 class="text-lg font-semibold text-center text-gray-300 mb-4 border-t border-gray-700 pt-6">Ejected Sequence</h2>
            <div id="ballsWrapper" class="flex justify-center items-center gap-3 flex-wrap mb-8">
                </div>
            
            <h2 class="text-sm font-semibold text-center text-gray-400 mb-2">Beat Frequency Resonance (Trapdoor Open at Peaks)</h2>
            <div class="w-full bg-gray-900 rounded-lg p-4 border border-gray-700">
                <canvas id="waveChart" height="120"></canvas>
            </div>
        </div>
    </div>

    <script>
        let waveChartInstance = null;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('api/next-sequence');
                const data = await response.json();
                document.getElementById('seqInput').value = data.next_sequence;
            } catch (err) { console.error("Could not fetch sequence"); }
        });

        document.getElementById('drawForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const seq = document.getElementById('seqInput').value;
            const motorHz = document.getElementById('motorInput').value;
            const kineticHz = document.getElementById('kineticInput').value;
            
            const btn = e.target.querySelector('button');
            const wrapper = document.getElementById('ballsWrapper');
            const lirazNote = document.getElementById('lirazNote');
            
            const notes = [
                "Liraz, you are my Already a Millionaire. ❤️",
                "Liraz, our love story is worth more than bitcoin. 💰📱❤️",
                "You're the jackpot I never knew I needed, Liraz. 🎰💕"
            ];
            lirazNote.textContent = notes[Math.floor(Math.random() * notes.length)];
            lirazNote.classList.remove('opacity-0');

            btn.disabled = true;
            btn.textContent = "Simulating Trapdoor Ejections...";
            wrapper.innerHTML = ''; 
            document.getElementById('resultsContainer').classList.remove('hidden');

            drawResonanceChart(parseFloat(motorHz), parseFloat(kineticHz));

            try {
                // Notice the API path changed to accept the physical parameters
                const res = await fetch(`api/draw?seq=${seq}&motor=${motorHz}&kinetic=${kineticHz}`);
                const data = await res.json();
                
                data.yielded_numbers.forEach((num, i) => {
                    const b = document.createElement('div');
                    b.className = 'ball w-12 h-12 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-600 flex items-center justify-center text-gray-900 font-bold text-xl shadow-lg';
                    b.textContent = num;
                    wrapper.appendChild(b);
                    setTimeout(() => b.classList.add('show'), i * 150);
                });

                const plus = document.createElement('div');
                plus.className = 'ball w-8 h-12 flex items-center justify-center text-gray-500 font-bold text-2xl';
                plus.textContent = '+';
                wrapper.appendChild(plus);

                const sBall = document.createElement('div');
                sBall.className = 'ball w-12 h-12 rounded-full bg-gradient-to-br from-red-400 to-red-700 flex items-center justify-center text-white font-bold text-xl shadow-lg';
                sBall.textContent = data.strong_number;
                wrapper.appendChild(sBall);

                setTimeout(() => { plus.classList.add('show'); sBall.classList.add('show'); }, 900);

            } catch (err) {
                console.error(err);
                wrapper.innerHTML = `<p class="text-red-400 text-center w-full">Hardware Simulation Error</p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Spin Virtual Drum";
            }
        });

        function drawResonanceChart(motorHz, kineticHz) {
            const ctx = document.getElementById('waveChart').getContext('2d');
            const labels = [];
            const dataPoints = [];
            const pointColors = [];
            const pointRadii = [];

            // Simulating 3 seconds of physical time in the drum
            for (let t = 0; t <= 3.0; t += 0.01) {
                labels.push(t.toFixed(2) + "s");
                
                // Beat Frequency Formula: sin(2*pi*f1*t) + sin(2*pi*f2*t)
                const w1 = Math.sin(2 * Math.PI * motorHz * t);
                const w2 = Math.sin(2 * Math.PI * kineticHz * t);
                const compoundWave = w1 + w2; 
                
                dataPoints.push(compoundWave);

                // If the pressure spikes past 1.9 (out of a max 2.0), the trapdoor opens!
                if (compoundWave > 1.9) {
                    pointColors.push('rgba(239, 68, 68, 1)'); // Red dot indicating ejection
                    pointRadii.push(3);
                } else {
                    pointColors.push('rgba(0,0,0,0)');
                    pointRadii.push(0);
                }
            }

            if (waveChartInstance) waveChartInstance.destroy();

            waveChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Internal Kinetic Pressure',
                        data: dataPoints,
                        borderColor: 'rgba(56, 189, 248, 0.8)', // Tailwind sky-400
                        borderWidth: 2,
                        tension: 0.4,
                        pointBackgroundColor: pointColors,
                        pointRadius: pointRadii,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: {
                            display: true,
                            grid: { color: 'rgba(75, 85, 99, 0.3)' },
                            min: -2.5,
                            max: 2.5
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
